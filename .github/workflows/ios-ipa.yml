name: iOS IPA

on:
  push:
    tags:
      - 'v*'
      - 'ios-v*'
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      export_method:
        description: IPA export method
        required: true
        default: ad-hoc
        type: choice
        options:
          - development
          - ad-hoc
          - app-store
          - enterprise

permissions:
  contents: read

jobs:
  build-ipa:
    name: Build IPA
    runs-on: macos-14
    timeout-minutes: 60
    env:
      DEVELOPER_DIR: /Applications/Xcode.app/Contents/Developer
      ARCHIVE_PATH: ${{ runner.temp }}/PutivnykIOS.xcarchive
      EXPORT_PATH: ${{ runner.temp }}/ipa-export
      KEYCHAIN_PATH: ${{ runner.temp }}/build.keychain-db
      PROFILE_PATH: ${{ runner.temp }}/Putivnyk.mobileprovision
      PROJECT_PATH: iosApp/PutivnykIOS.xcodeproj
      SCHEME: PutivnykIOS
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Resolve export method
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "EXPORT_METHOD=${{ inputs.export_method }}" >> "$GITHUB_ENV"
          else
            echo "EXPORT_METHOD=ad-hoc" >> "$GITHUB_ENV"
          fi

      - name: Validate signing secrets
        env:
          IOS_CERTIFICATE_P12_BASE64: ${{ secrets.IOS_CERTIFICATE_P12_BASE64 }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          IOS_PROVISIONING_PROFILE_NAME: ${{ secrets.IOS_PROVISIONING_PROFILE_NAME }}
          IOS_TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
          IOS_BUNDLE_IDENTIFIER: ${{ secrets.IOS_BUNDLE_IDENTIFIER }}
          IOS_CODE_SIGN_IDENTITY: ${{ secrets.IOS_CODE_SIGN_IDENTITY }}
        run: |
          set -euo pipefail
          required_vars=(
            IOS_CERTIFICATE_P12_BASE64
            IOS_CERTIFICATE_PASSWORD
            IOS_PROVISIONING_PROFILE_BASE64
            IOS_PROVISIONING_PROFILE_NAME
            IOS_TEAM_ID
            IOS_BUNDLE_IDENTIFIER
            IOS_CODE_SIGN_IDENTITY
          )
          for var_name in "${required_vars[@]}"; do
            if [ -z "${!var_name:-}" ]; then
              echo "Missing required GitHub secret: ${var_name}" >&2
              exit 1
            fi
          done

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Prepare tools
        run: |
          chmod +x ./gradlew
          chmod +x ./iosApp/scripts/*.sh
          chmod +x ./scripts/ios/*.sh

      - name: Generate Xcode project
        working-directory: iosApp
        run: xcodegen generate

      - name: Install signing assets
        env:
          IOS_CERTIFICATE_P12_BASE64: ${{ secrets.IOS_CERTIFICATE_P12_BASE64 }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
        run: |
          set -euo pipefail
          printf '%s' "$IOS_CERTIFICATE_P12_BASE64" | base64 -D -o "$RUNNER_TEMP/signing_certificate.p12"
          printf '%s' "$IOS_PROVISIONING_PROFILE_BASE64" | base64 -D -o "$PROFILE_PATH"

          security cms -D -i "$PROFILE_PATH" > "$RUNNER_TEMP/provisioning_profile.plist"
          PROFILE_UUID=$(/usr/libexec/PlistBuddy -c 'Print UUID' "$RUNNER_TEMP/provisioning_profile.plist")
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp "$PROFILE_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/$PROFILE_UUID.mobileprovision"

          security create-keychain -p runner "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p runner "$KEYCHAIN_PATH"
          security import "$RUNNER_TEMP/signing_certificate.p12" \
            -P "$IOS_CERTIFICATE_PASSWORD" \
            -A \
            -t cert \
            -f pkcs12 \
            -k "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k runner "$KEYCHAIN_PATH"

      - name: Archive app
        env:
          IOS_TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
          IOS_BUNDLE_IDENTIFIER: ${{ secrets.IOS_BUNDLE_IDENTIFIER }}
          IOS_CODE_SIGN_IDENTITY: ${{ secrets.IOS_CODE_SIGN_IDENTITY }}
          IOS_PROVISIONING_PROFILE_NAME: ${{ secrets.IOS_PROVISIONING_PROFILE_NAME }}
        run: |
          set -euo pipefail
          xcodebuild \
            -project "$PROJECT_PATH" \
            -scheme "$SCHEME" \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -archivePath "$ARCHIVE_PATH" \
            PRODUCT_BUNDLE_IDENTIFIER="$IOS_BUNDLE_IDENTIFIER" \
            DEVELOPMENT_TEAM="$IOS_TEAM_ID" \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="$IOS_CODE_SIGN_IDENTITY" \
            PROVISIONING_PROFILE_SPECIFIER="$IOS_PROVISIONING_PROFILE_NAME" \
            archive

      - name: Create export options
        env:
          IOS_TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
          IOS_BUNDLE_IDENTIFIER: ${{ secrets.IOS_BUNDLE_IDENTIFIER }}
          IOS_PROVISIONING_PROFILE_NAME: ${{ secrets.IOS_PROVISIONING_PROFILE_NAME }}
        run: |
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>${EXPORT_METHOD}</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>teamID</key>
            <string>${IOS_TEAM_ID}</string>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>compileBitcode</key>
            <false/>
            <key>provisioningProfiles</key>
            <dict>
              <key>${IOS_BUNDLE_IDENTIFIER}</key>
              <string>${IOS_PROVISIONING_PROFILE_NAME}</string>
            </dict>
          </dict>
          </plist>
          EOF

      - name: Export IPA
        run: |
          set -euo pipefail
          xcodebuild \
            -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$EXPORT_PATH" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: PutivnykIOS-ipa-${{ github.run_number }}
          path: |
            ${{ runner.temp }}/ipa-export/*.ipa
            ${{ runner.temp }}/ipa-export/*.plist
          if-no-files-found: error
          retention-days: 14

      - name: Cleanup signing assets
        if: always()
        run: |
          rm -f "$RUNNER_TEMP/signing_certificate.p12"
          rm -f "$PROFILE_PATH"
          rm -f "$RUNNER_TEMP/provisioning_profile.plist"
          rm -f "$RUNNER_TEMP/ExportOptions.plist"
          rm -rf "$EXPORT_PATH"
          security delete-keychain "$KEYCHAIN_PATH" || true