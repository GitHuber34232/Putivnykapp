name: iOS Simulator

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-simulator:
    name: Build iOS Simulator App
    runs-on: macos-14
    timeout-minutes: 45
    env:
      DEVELOPER_DIR: /Applications/Xcode.app/Contents/Developer
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Prepare tools
        run: |
          chmod +x ./gradlew
          chmod +x ./iosApp/scripts/*.sh
          chmod +x ./scripts/ios/*.sh

      - name: Generate Xcode project
        working-directory: iosApp
        run: xcodegen generate

      - name: Stage shared XCFramework
        run: ./iosApp/scripts/build-shared.sh

      - name: Build simulator app
        env:
          PUTIVNYK_SKIP_SHARED_BUILD: '1'
        run: |
          xcodebuild \
            -project iosApp/PutivnykIOS.xcodeproj \
            -scheme PutivnykIOS \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            build

      - name: Upload DerivedData logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: PutivnykIOS-simulator-logs-${{ github.run_number }}
          path: |
            ~/Library/Developer/Xcode/DerivedData/**/Logs/**
          if-no-files-found: ignore
          retention-days: 7