name: PutivnykIOS

options:
  xcodeVersion: "15.4"
  projectFormat: xcode15_3
  deploymentTarget:
    iOS: "17.0"
  groupSortPosition: top

configs:
  Debug: debug
  Release: release

targets:
  PutivnykIOS:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: PutivnykIOS
    info:
      path: PutivnykIOS/Info.plist
      properties:
        CFBundleDisplayName: Putivnyk
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        BGTaskSchedulerPermittedIdentifiers:
          - ua.kyiv.putivnyk.ios.sync.events
          - ua.kyiv.putivnyk.ios.sync.offline-cache
        NSLocationWhenInUseUsageDescription: "Путівник використовує ваше місцезнаходження для навігації та пошуку місць поблизу."
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ua.kyiv.putivnyk.ios
        INFOPLIST_FILE: PutivnykIOS/Info.plist
        SWIFT_VERSION: "5.10"
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: "" # Set your Apple Developer Team ID here
    preBuildScripts:
      - name: Sync iOS resources
        script: |
          "${SRCROOT}/scripts/sync-resources.sh"
        basedOnDependencyAnalysis: false
      - name: Build shared XCFramework
        script: |
          "${SRCROOT}/scripts/build-shared.sh"
        basedOnDependencyAnalysis: false
    dependencies:
      - framework: Frameworks/PutivnykShared.xcframework
    scheme:
      testTargets: []